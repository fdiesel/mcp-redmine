services:
  mcp-redmine:
    build: .
    ports:
      - 8000:8000
    env_file:
      - .env

  inspector:
    image: node:22-alpine
    command: npx --yes @modelcontextprotocol/inspector
    ports:
      - "6274:6274"
      - "3002:3002"
    environment:
      HOST: 0.0.0.0
      CLIENT_PORT: 6274
      SERVER_PORT: 3002
